<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direito Penal (Legado)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:wght@400;600;700&display=swap');

        :root {
            --primary: #4f46e5;
            --bg: #fcfcf9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .serif { font-family: 'Source Serif 4', serif; }

        .sidebar-item.active {
            background-color: #fff;
            border-left: 4px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            font-weight: 700;
            color: #000;
        }

        .topic-expansion {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }

        .topic-card.open .topic-expansion {
            max-height: 30000px;
            opacity: 1;
            padding-bottom: 1.5rem;
        }

        .topic-card.open .chevron {
            transform: rotate(180deg);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Estilo do conteúdo Markdown renderizado */
        .markdown-content h1 { font-size: 1.85rem; font-weight: 800; margin-bottom: 0.5rem; color: #0f172a; }
        .markdown-content h2 { font-size: 1.1rem; font-weight: 800; margin-top: 2rem; margin-bottom: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
        .markdown-content h3 { font-weight: 700; margin-top: 1.25rem; font-size: 1rem; color: #1e293b; }
        .markdown-content p, .markdown-content li { line-height: 1.75; color: #334155; font-size: 0.925rem; }
        .markdown-content ul, .markdown-content ol { margin-left: 1.25rem; margin-bottom: 1rem; }
        .markdown-content li { margin-bottom: 0.35rem; list-style-type: disc; }
        .markdown-content strong { color: #0f172a; font-weight: 700; }
        .markdown-content em { color: #475569; }
        .markdown-content table { width: 100%; border-collapse: collapse; margin: 1rem 0 1.5rem; font-size: 0.85rem; }
        .markdown-content th { background: #f8fafc; color: var(--primary); text-align: left; padding: 0.6rem 0.8rem; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.04em; }
        .markdown-content td { padding: 0.6rem 0.8rem; border-top: 1px solid #f1f5f9; vertical-align: top; }
        .markdown-content pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; margin: 1rem 0; }
        .markdown-content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; background-color: #f1f5f9; padding: 0.15rem 0.35rem; border-radius: 0.25rem; color: #0f172a; }
        .markdown-content pre code { background-color: transparent; padding: 0; color: inherit; }
        .markdown-content hr { margin: 2rem 0; border: 0; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body class="overflow-hidden">

    <nav class="h-16 border-b border-slate-200 bg-white flex items-center justify-between px-6 z-50 relative">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-[var(--primary)] hover:bg-slate-100 transition-colors text-lg" title="Voltar ao hub">←</a>
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-[var(--primary)] font-black text-xl shadow-lg">⚖️</div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight leading-none serif">Direito Penal (Legado) <span class="text-[var(--primary)]">Atlas</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Pós-Graduação em Direito Penal e Processual Penal</p>
            </div>
        </div>
        <div class="relative w-1/3 max-w-md hidden md:block">
            <input type="text" id="searchInput" placeholder="Buscar conceito, algoritmo ou termo..."
                   class="w-full bg-slate-100 border-none rounded-full py-2 px-10 text-sm focus:ring-2 focus:ring-[var(--primary)] transition-all">
            <span class="absolute left-4 top-2.5 opacity-40">🔍</span>
        </div>
        <div class="flex items-center gap-4 text-[10px] font-black text-slate-400 uppercase tracking-tighter">
            <span id="disciplinasCount" class="bg-slate-100 px-2 py-1 rounded">0 disciplinas</span>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-64px)]">
        <!-- Sidebar Navigation -->
        <aside class="w-20 md:w-80 bg-slate-50 border-r border-slate-200 overflow-y-auto custom-scroll flex-shrink-0">
            <div class="p-4 space-y-1" id="sidebarNav">
                <!-- Blocos gerados por JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto custom-scroll p-4 md:p-8 bg-[#fcfcf9]">
            <div class="max-w-5xl mx-auto">

                <div id="moduleHeader" class="mb-10 animate-in fade-in slide-in-from-top-4 duration-500">
                    <p class="text-slate-400 text-sm">Carregando atlas...</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <!-- Syllabus Content -->
                    <div class="lg:col-span-8 space-y-4" id="topicsGrid">
                        <!-- Tópicos interativos expandidos aqui -->
                    </div>

                    <!-- Side Contextual Info -->
                    <div class="lg:col-span-4 space-y-6">
                        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm sticky top-4">
                            <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 text-center">Perfil de Domínio</h3>
                            <div class="chart-container">
                                <canvas id="radarChart"></canvas>
                            </div>
                            <div id="moduleStats" class="mt-6 pt-6 border-t border-slate-50 text-[12px] text-slate-500 leading-relaxed italic">
                                <!-- Insight dinâmico -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const DOMINIOS = [
            { id: "D01", titulo: "Fundamentos e Teoria Geral do Direito Penal", disciplinas: [
                ["D01.01", "Princípios Constitucionais do Direito Penal", "Foundation", "24-32h", true],
                ["D01.02", "Hermenêutica Penal e Teoria da Interpretação Jurídica", "Foundation", "20-28h", false],
                ["D01.03", "Teoria Geral do Crime", "Foundation", "40-50h", true],
                ["D01.04", "Teoria da Pena e Concurso de Crimes", "Foundation", "32-40h", true],
                ["D01.05", "Aplicação da Lei Penal e Extinção da Punibilidade", "Foundation", "24-30h", true]
            ]},
            { id: "D02", titulo: "Criminologia, Política Criminal e Direitos Humanos", disciplinas: [
                ["D02.01", "Criminologia Geral e Teorias da Criminalidade", "Intermediate", "28-34h", true],
                ["D02.02", "Vitimologia e Justiça Restaurativa", "Intermediate", "20-26h", false],
                ["D02.03", "Política Criminal e Sistema Prisional", "Intermediate", "28-34h", true],
                ["D02.04", "Direitos Humanos e Direito Penal Internacional", "Advanced", "28-34h", false]
            ]},
            { id: "D03", titulo: "Teoria Geral do Processo Penal", disciplinas: [
                ["D03.01", "Princípios e Garantias do Processo Penal", "Foundation", "28-34h", true],
                ["D03.02", "Inquérito Policial e Ação Penal", "Foundation", "26-32h", true],
                ["D03.03", "Prisões Cautelares e Medidas Diversas", "Foundation", "28-34h", true],
                ["D03.04", "Prova no Processo Penal", "Intermediate", "32-40h", true],
                ["D03.05", "Medicina Legal e Perícia Criminal", "Intermediate", "26-32h", false],
                ["D03.06", "Sentença, Recursos e Ações Autônomas de Impugnação", "Intermediate", "32-40h", true]
            ]},
            { id: "D04", titulo: "Direito Penal: Parte Especial", disciplinas: [
                ["D04.01", "Crimes contra a Pessoa", "Intermediate", "40-50h", true],
                ["D04.02", "Crimes contra o Patrimônio", "Intermediate", "36-44h", true],
                ["D04.03", "Crimes contra a Dignidade Sexual", "Intermediate", "28-34h", true],
                ["D04.04", "Crimes contra a Administração Pública e a Fé Pública", "Intermediate", "32-40h", true]
            ]},
            { id: "D05", titulo: "Processo Penal: Procedimentos e Institutos Especiais", disciplinas: [
                ["D05.01", "Tribunal do Júri", "Advanced", "36-44h", true],
                ["D05.02", "Cadeia de Custódia da Prova", "Advanced", "36-44h", true],
                ["D05.03", "Justiça Penal Consensual e Juizados Especiais Criminais", "Advanced", "36-44h", true]
            ]},
            { id: "D06", titulo: "Legislação Penal Especial", disciplinas: [
                ["D06.01", "Lei de Drogas", "Advanced", "36-44h", true],
                ["D06.02", "Lei Maria da Penha e Violência de Gênero", "Advanced", "36-44h", true],
                ["D06.03", "Crimes Digitais", "Advanced", "24-30h", false]
            ]},
            { id: "D07", titulo: "Direito Penal Econômico e Criminalidade Organizada", disciplinas: [
                ["D07.01", "Organizações Criminosas e Colaboração Premiada", "Specialist", "32-40h", true],
                ["D07.02", "Crimes Tributários e Contra o Sistema Financeiro", "Specialist", "28-34h", false],
                ["D07.03", "Lavagem de Capitais e Compliance Criminal", "Specialist", "28-34h", false]
            ]},
            { id: "D08", titulo: "Execução Penal", disciplinas: [
                ["D08.01", "Execução Penal", "Advanced", "36-44h", true]
            ]},
            { id: "D09", titulo: "Prática Criminal", disciplinas: [
                ["D09.01", "Técnicas de Atuação na Advocacia Criminal", "Specialist", "32-40h", true],
                ["D09.02", "Prática Processual Penal: Peças e Simulações", "Specialist", "36-44h", true],
                ["D09.03", "Pacote Anticrime: Reformas Estruturais do Sistema de Justiça Criminal", "Specialist (capstone)", "20-28h", true]
            ]}
        ];

        const FILE_MAP = {
            "D01.01": "principios-constitucionais", "D01.02": "hermeneutica-penal", "D01.03": "teoria-geral-do-crime",
            "D01.04": "teoria-da-pena-e-concurso-de-crimes", "D01.05": "aplicacao-da-lei-penal-e-extincao-da-punibilidade",
            "D02.01": "criminologia-geral", "D02.02": "vitimologia-e-justica-restaurativa", "D02.03": "politica-criminal-e-sistema-prisional",
            "D02.04": "direitos-humanos-e-direito-penal-internacional",
            "D03.01": "principios-e-garantias-do-processo-penal", "D03.02": "inquerito-policial-e-acao-penal",
            "D03.03": "prisoes-cautelares-e-medidas-diversas", "D03.04": "prova-no-processo-penal",
            "D03.05": "medicina-legal-e-pericia-criminal", "D03.06": "sentenca-recursos-e-acoes-autonomas-de-impugnacao",
            "D04.01": "crimes-contra-a-pessoa", "D04.02": "crimes-contra-o-patrimonio", "D04.03": "crimes-contra-a-dignidade-sexual",
            "D04.04": "crimes-contra-a-administracao-publica-e-a-fe-publica",
            "D05.01": "tribunal-do-juri", "D05.02": "cadeia-de-custodia-da-prova", "D05.03": "justica-penal-consensual-e-juizados-especiais",
            "D06.01": "lei-de-drogas", "D06.02": "lei-maria-da-penha", "D06.03": "crimes-digitais",
            "D07.01": "organizacoes-criminosas-e-colaboracao-premiada", "D07.02": "crimes-tributarios-e-sistema-financeiro",
            "D07.03": "lavagem-de-capitais-e-compliance-criminal",
            "D08.01": "execucao-penal",
            "D09.01": "tecnicas-de-atuacao-na-advocacia-criminal", "D09.02": "pratica-processual-penal", "D09.03": "pacote-anticrime"
        };

        const mdCache = {};
        let activeChart = null;

        window.onload = () => {
            initSidebar();
            selectModule(0);
        };

        function initSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = DOMINIOS.map((m, idx) => `
                <button onclick="selectModule(${idx})" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg text-left transition-all group">
                    <div class="w-10 h-10 rounded-lg bg-slate-100 group-hover:bg-[var(--primary)]/10 flex items-center justify-center text-[11px] font-black shrink-0 transition-colors">
                        ${m.id || ("0" + (idx + 1)).slice(-2)}
                    </div>
                    <span class="text-[11px] font-black hidden md:block truncate uppercase tracking-tight text-slate-500 group-[.active]:text-slate-900">${m.titulo}</span>
                </button>
            `).join('');
            
            const totalDiscs = DOMINIOS.reduce((acc, m) => acc + m.disciplinas.length, 0);
            document.getElementById('disciplinasCount').innerText = `${totalDiscs} disciplinas`;
        }

        function selectModule(idx) {
            const dominio = DOMINIOS[idx];
            const disciplinas = dominio.disciplinas;

            document.querySelectorAll('.sidebar-item').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });

            document.getElementById('moduleHeader').innerHTML = `
                <div class="flex flex-wrap items-center gap-2 mb-3">
                    <span class="bg-[var(--primary)] text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Domínio ${dominio.id || ("0" + (idx + 1)).slice(-2)}</span>
                    <span class="bg-white border border-slate-200 text-slate-500 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${disciplinas.length} disciplinas</span>
                </div>
                <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">${dominio.titulo}</h2>
            `;

            document.getElementById('moduleStats').innerHTML = `
                <p class="font-semibold text-slate-700 mb-2">Visão do Domínio</p>
                <p class="text-xs text-slate-500 leading-relaxed">Este módulo cobre de forma aprofundada os conceitos de ${dominio.titulo.toLowerCase()}, fundamentando competências críticas e práticas para o desenvolvimento profissional.</p>
            `;

            const grid = document.getElementById('topicsGrid');
            grid.innerHTML = disciplinas.map(([id, nome], i) => `
                <div class="topic-card bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm transition-all hover:border-[var(--primary)]/50">
                    <button onclick="toggleTopic(this, '${id}')" class="w-full p-5 flex items-start justify-between gap-4 text-left focus:outline-none bg-white hover:bg-slate-50/50 transition-colors">
                        <div class="flex items-start gap-4 min-w-0">
                            <span class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center text-[10px] text-white font-black shrink-0">${i+1}</span>
                            <div class="min-w-0">
                                <span class="block font-extrabold text-slate-800 text-sm uppercase tracking-tight leading-snug break-words">${nome}</span>
                                <div class="flex flex-wrap gap-1.5 mt-2">
                                    <span class="bg-slate-900 text-white px-2 py-0.5 rounded text-[9px] font-black uppercase mono">${id}</span>
                                    <span class="bg-slate-50 text-slate-500 border border-slate-100 px-2 py-0.5 rounded text-[9px] font-black uppercase">Acadêmico</span>
                                </div>
                            </div>
                        </div>
                        <span class="chevron transition-transform duration-500 text-slate-300 text-xs shrink-0 mt-2">▼</span>
                    </button>
                    <div class="topic-expansion">
                        <div class="px-6 pb-6 pt-5 border-t border-slate-100 bg-slate-50/30">
                            <!-- Grid Estruturado do Atlas -->
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" id="grid-top-${id}"></div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6 mb-8" id="grid-bottom-${id}"></div>
                            
                            <!-- Conteúdo Detalhado Completo -->
                            <div class="pt-6 border-t border-slate-200">
                                <h6 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-[0.18em]">Conteúdo Detalhado e Códigos</h6>
                                <div class="markdown-content" id="content-${id}">
                                    <p class="text-slate-400 text-xs">Carregando conteúdo programático...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            const radarVals = [];
            for (let i = 0; i < 6; i++) {
                const code = (dominio.titulo.charCodeAt(i % dominio.titulo.length) * (i + 1)) % 40 + 60;
                radarVals.push(code);
            }
            updateRadar(radarVals);
        }

        async function toggleTopic(btn, id) {
            const card = btn.closest('.topic-card');
            const isOpen = card.classList.contains('open');

            document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('open'));

            if (!isOpen) {
                card.classList.add('open');
                await loadDisciplineContent(id);
            }
        }

        async function loadDisciplineContent(id) {
            const container = document.getElementById(`content-${id}`);
            const gridTop = document.getElementById(`grid-top-${id}`);
            const gridBottom = document.getElementById(`grid-bottom-${id}`);

            if (mdCache[id]) {
                container.innerHTML = mdCache[id].html;
                gridTop.innerHTML = mdCache[id].topHtml;
                gridBottom.innerHTML = mdCache[id].bottomHtml;
                renderMath(container);
                return;
            }

            try {
                let filename = FILE_MAP[id];
                if (filename.endsWith('.md')) {
                    filename = filename.slice(0, -3);
                }
                const response = await fetch(`disciplinas/${filename}.md`);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const md = await response.text();
                
                // 1. Renderizar o Markdown completo
                const html = marked.parse(md);
                
                // 2. Parsear as seções para o grid estruturado
                const parsed = parseMarkdownToSections(md);
                
                const topHtml = `
                    ${renderList("Pré-requisitos", parsed.prereqs, "bg-blue-400")}
                    ${renderList("Objetivos", parsed.objetivos, "bg-amber-500")}
                    ${renderList("Prática esperada", parsed.pratica, "bg-emerald-500")}
                `;
                
                const bottomHtml = `
                    ${renderList("Teoria", parsed.teoria, "bg-slate-400")}
                    ${renderList("Algoritmos e técnicas", parsed.algoritmos, "bg-indigo-400")}
                    ${renderList("Livros", parsed.livros, "bg-amber-500")}
                    ${renderList("Papers e referências", parsed.papers, "bg-rose-400")}
                    ${renderList("Ferramentas", parsed.ferramentas, "bg-cyan-500")}
                    ${renderList("Entrevista Staff", parsed.entrevista, "bg-violet-500")}
                    ${renderList("Projetos", parsed.projetos, "bg-emerald-500")}
                    ${renderList("Exercícios", parsed.exercicios, "bg-slate-500")}
                    ${renderList("Estado da arte e debates", parsed.debates, "bg-orange-500")}
                `;

                mdCache[id] = { html, topHtml, bottomHtml };
                
                container.innerHTML = html;
                gridTop.innerHTML = topHtml;
                gridBottom.innerHTML = bottomHtml;
                
                renderMath(container);
            } catch (err) {
                container.innerHTML = `<p class="text-rose-500 text-xs font-semibold">Erro ao carregar (${err.message}). Acesse por servidor HTTP local.</p>`;
            }
        }

        function parseMarkdownToSections(md) {
            const sections = {};
            const parts = md.split(/
##\s+/);
            
            // Extrair pre-requisitos da intro/metadados
            const intro = parts[0];
            const prereqMatch = intro.match(/\*\*Pré-requisitos:\*\*\s*(.*)/i);
            const prereqsMeta = prereqMatch ? [prereqMatch[1].trim()] : [];

            // Limpar seções
            parts.forEach(part => {
                const lines = part.split('
');
                const title = lines[0].trim().toLowerCase();
                const content = lines.slice(1).join('
').trim();
                sections[title] = content;
            });

            const getSectionItems = (keys) => {
                for (let k of keys) {
                    if (sections[k]) return extractListOrParagraph(sections[k]);
                }
                return [];
            };

            // Mapeamentos para as 12 seções estruturadas
            const prereqs = getSectionItems(['pré-requisitos', 'pre-requisitos']);
            const objetivos = getSectionItems(['objetivos']);
            const pratica = getSectionItems(['prática profissional', 'pratica profissional', 'prática esperada']);
            
            // Separar Teoria e Algoritmos do conteúdo programático se houver
            let teoria = [];
            let algoritmos = [];
            const progContent = sections['conteúdo programático'] || sections['conteudo programatico'] || '';
            if (progContent) {
                const teorMatch = progContent.match(/\*\*Teoria\*\*\s*—\s*([^
]+)/i) || progContent.match(/\*\*Teoria Estatística\*\*\s*—\s*([^
]+)/i);
                if (teorMatch) teoria = teorMatch[1].split(';').map(s => s.trim());
                
                const algMatch = progContent.match(/\*\*Algoritmos e técnicas\*\*\s*—\s*([^
]+)/i) || progContent.match(/\*\*Implementação\*\*\s*—\s*([^
]+)/i) || progContent.match(/\*\*Aplicação prática\*\*\s*—\s*([^
]+)/i) || progContent.match(/\*\*Implementação em Python\*\*\s*—\s*([^
]+)/i);
                if (algMatch) algoritmos = algMatch[1].split(';').map(s => s.trim());
            }

            const livros = getSectionItems(['doutrina / referências técnicas', 'doutrina / referencias tecnicas', 'referências bibliográficas', 'referencias bibliograficas', 'referencias', 'referências']);
            const papers = getSectionItems(['doutrina / referências técnicas', 'doutrina / referencias tecnicas']);
            
            // Extrair ferramentas das tags ou do texto
            const tagsContent = sections['tags'] || '';
            const ferramentas = tagsContent.split('#').map(t => t.trim()).filter(t => t.length > 0);

            const entrevista = getSectionItems(['questões avançadas', 'questoes avancadas', 'questões teóricas', 'questoes teoricas', 'questões']);
            const projetos = getSectionItems(['casos práticos', 'casos praticos', 'projetos']);
            const exercicios = getSectionItems(['exercícios', 'exercicios', 'exercícios práticos', 'exercicios praticos']);
            const debates = getSectionItems(['estado da arte e debates em aberto', 'estado da arte e debates', 'estado da arte']);

            return {
                prereqs: prereqs.length ? prereqs : (prereqsMeta.length ? prereqsMeta : ["Nenhum"]),
                objetivos,
                pratica: pratica.length ? pratica : ["Implementação de algoritmos e exercícios de fixação."],
                teoria: teoria.length ? teoria : ["Estudo dos fundamentos teóricos do módulo."],
                algoritmos: algoritmos.length ? algoritmos : ["Implementação e otimização de rotinas em Python/linguagem correspondente."],
                livros: livros.slice(0, 3),
                papers: papers.slice(3, 6).length ? papers.slice(3, 6) : ["Consulte referências adicionais no conteúdo detalhado."],
                ferramentas: ferramentas.length ? ferramentas : ["Python", "Git"],
                entrevista,
                projetos,
                exercicios,
                debates
            };
        }

        function extractListOrParagraph(text) {
            if (!text) return [];
            
            // 1. Tentar extrair lista estruturada (- ou *)
            const lines = text.split('
');
            const items = [];
            lines.forEach(l => {
                const trimmed = l.trim();
                if (trimmed.startsWith('-') || trimmed.startsWith('*')) {
                    items.push(trimmed.replace(/^[-*]\s+/, ''));
                } else if (/^\d+\.\s+/.test(trimmed)) {
                    items.push(trimmed.replace(/^\d+\.\s+/, ''));
                }
            });
            
            if (items.length > 0) return items;

            // 2. Se for texto corrido, separar por ponto e vírgula ou parágrafos curtos
            return text
                .replace(/\*\* [^*]+\*\*\s*—/g, '') // Limpar tags em negrito
                .split(/[;\.]/)
                .map(s => s.trim())
                .filter(s => s.length > 10 && !s.startsWith('#'));
        }

        function renderList(title, items, marker = "bg-slate-300") {
            if (!items || !items.length) return "";

            return `
                <section class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm hover:border-[var(--primary)]/20 transition-all flex flex-col">
                    <h6 class="text-[10px] font-black uppercase text-slate-400 mb-3 tracking-[0.18em]">$Direito Penal (Legado)</h6>
                    <ul class="space-y-2">
                        ${items.map(item => `
                            <li class="flex gap-2 text-[11px] leading-relaxed text-slate-600">
                                <span class="w-1.5 h-1.5 rounded-full ${marker} mt-1.5 shrink-0"></span>
                                <span>${item}</span>
                            </li>
                        `).join('')}
                    </ul>
                </section>
            `;
        }

        function renderMath(el) {
            if (typeof renderMathInElement !== "undefined") {
                renderMathInElement(el, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError : false
                });
            }
        }

        function updateRadar(data) {
            if (typeof Chart === "undefined") return;
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (activeChart) activeChart.destroy();

            activeChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Teoria', 'Sistemas', 'Execução', 'Metodologia', 'Aplicação', 'Conformidade'],
                    datasets: [{
                        data: data,
                        backgroundColor: 'rgba(30, 41, 59, 0.05)',
                        borderColor: '#4f46e5',
                        borderWidth: 3,
                        pointBackgroundColor: '#0f172a',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: { display: false },
                            grid: { color: '#f1f5f9' },
                            angleLines: { color: '#f1f5f9' },
                            pointLabels: {
                                font: { size: 9, weight: '800', family: 'Inter' },
                                color: '#94a3b8'
                            }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.topic-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = term.length < 2 || text.includes(term) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
