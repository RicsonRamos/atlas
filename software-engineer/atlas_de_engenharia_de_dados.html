<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas de Engenharia de Dados: Staff Level</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --primary: #f59e0b;
            --bg: #fcfcf9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .sidebar-item.active {
            background-color: #fff;
            border-left: 4px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            font-weight: 700;
            color: #000;
        }

        .topic-expansion {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }

        .topic-card.open .topic-expansion {
            max-height: 12000px;
            opacity: 1;
            padding-bottom: 1.5rem;
        }

        .topic-card.open .chevron {
            transform: rotate(180deg);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="overflow-hidden">

    <nav class="h-16 border-b border-slate-200 bg-white flex items-center justify-between px-6 z-50 relative">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-amber-500 font-black text-xl shadow-lg">Σ</div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight leading-none">StaffData <span class="text-amber-500">Atlas</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Ementa de Engenharia de Elite</p>
            </div>
        </div>
        <div class="relative w-1/3 max-w-md hidden md:block">
            <input type="text" id="searchInput" placeholder="Buscar conceito, algoritmo ou ferramenta..."
                   class="w-full bg-slate-100 border-none rounded-full py-2 px-10 text-sm focus:ring-2 focus:ring-amber-500 transition-all">
            <span class="absolute left-4 top-2.5 opacity-40">🔍</span>
        </div>
        <div class="flex items-center gap-4 text-[10px] font-black text-slate-400 uppercase tracking-tighter">
            <span class="bg-slate-100 px-2 py-1 rounded">v5.0 Staff Atlas</span>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-64px)]">
        <!-- Sidebar Navigation -->
        <aside class="w-20 md:w-80 bg-slate-50 border-r border-slate-200 overflow-y-auto custom-scroll flex-shrink-0">
            <div class="p-4 space-y-1" id="sidebarNav">
                <!-- Blocos gerados por JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto custom-scroll p-4 md:p-8 bg-[#fcfcf9]">
            <div class="max-w-5xl mx-auto">

                <div id="moduleHeader" class="mb-10 animate-in fade-in slide-in-from-top-4 duration-500">
                    <p class="text-slate-400 text-sm">Carregando atlas...</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <!-- Syllabus Content -->
                    <div class="lg:col-span-8 space-y-4" id="topicsGrid">
                        <!-- Tópicos interativos expandidos aqui -->
                    </div>

                    <!-- Side Contextual Info -->
                    <div class="lg:col-span-4 space-y-6">
                        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm sticky top-4">
                            <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 text-center">Perfil de Domínio</h3>
                            <div class="chart-container">
                                <canvas id="radarChart"></canvas>
                            </div>
                            <div id="moduleStats" class="mt-6 pt-6 border-t border-slate-50 text-[12px] text-slate-500 leading-relaxed italic">
                                <!-- Insight dinâmico -->
                            </div>

                            <div class="mt-6 space-y-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-2 h-2 rounded-full bg-amber-500"></div>
                                    <span class="text-[10px] font-bold uppercase text-slate-500">Requisito de Liderança</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                                    <span class="text-[10px] font-bold uppercase text-slate-500">Base Computacional</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Estado em memória, carregado via fetch() de /data
        let indexData = null;
        let conceitos = null;
        const disciplinasCache = {};

        let currentModule = 0;
        let radarChart = null;

        async function loadAll() {
            const [idx, conc] = await Promise.all([
                fetch('data/index.json').then(r => r.json()),
                fetch('data/conceitos.json').then(r => r.json())
            ]);
            indexData = idx;
            conceitos = conc;

            const allIds = idx.dominios.flatMap(d => d.disciplinas);
            const discs = await Promise.all(
                allIds.map(id => fetch(`data/disciplinas/${id}.json`).then(r => r.json()))
            );
            discs.forEach((d, i) => {
                d.__searchText = buildSearchText(d);
                disciplinasCache[allIds[i]] = d;
            });
        }

        function resolveConceitos(ids) {
            return (ids || []).map(id => (conceitos[id] ? conceitos[id].nome : id));
        }

        function buildSearchText(t) {
            return [
                t.nome,
                ...(t.prerequisitos || []),
                ...(t.objetivos || []),
                ...(t.pratica_esperada || []),
                ...resolveConceitos(t.teoria),
                ...resolveConceitos(t.algoritmos_tecnicas),
                ...resolveConceitos(t.arquiteturas),
                ...resolveConceitos(t.estruturas_dados),
                ...resolveConceitos(t.modelos_matematicos),
                ...resolveConceitos(t.protocolos),
                ...(t.livros || []),
                ...(t.papers_fundamentais || []),
                ...(t.ferramentas || []),
                ...(t.perguntas_entrevista_staff || []),
                ...(t.projetos_reais || []),
                ...(t.exercicios || []),
                ...(t.debates_estado_arte || []),
                ...(t.tags || [])
            ].join(' ').toLowerCase();
        }

        const ITEM_FIELDS = [
            "objetivos", "pratica_esperada", "teoria", "algoritmos_tecnicas",
            "arquiteturas", "estruturas_dados", "modelos_matematicos", "protocolos",
            "livros", "papers_fundamentais", "ferramentas",
            "perguntas_entrevista_staff", "projetos_reais", "exercicios",
            "debates_estado_arte", "tags"
        ];

        function countTopicItems(t) {
            return ITEM_FIELDS.reduce((total, key) => total + (t[key]?.length || 0), 0);
        }

        function initSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = indexData.dominios.map((m, idx) => `
                <button onclick="selectModule(${idx})" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg text-left transition-all group ${idx === 0 ? 'active' : ''}">
                    <div class="w-10 h-10 rounded-lg bg-slate-100 group-hover:bg-amber-100 flex items-center justify-center text-[11px] font-black shrink-0 transition-colors">
                        ${m.id}
                    </div>
                    <span class="text-[11px] font-black hidden md:block truncate uppercase tracking-tight text-slate-500 group-[.active]:text-slate-900">${m.titulo}</span>
                </button>
            `).join('');
        }

        function renderList(title, items, marker = "bg-slate-300") {
            if (!items?.length) return "";

            return `
                <section>
                    <h6 class="text-[10px] font-black uppercase text-slate-400 mb-2 tracking-[0.18em]">${title}</h6>
                    <ul class="space-y-1.5">
                        ${items.map(item => `
                            <li class="flex gap-2 text-[11px] leading-relaxed text-slate-600">
                                <span class="w-1.5 h-1.5 rounded-full ${marker} mt-1.5 shrink-0"></span>
                                <span>${item}</span>
                            </li>
                        `).join('')}
                    </ul>
                </section>
            `;
        }

        function renderTags(items) {
            if (!items?.length) return "";

            return `
                <div class="flex flex-wrap gap-2 pt-4 border-t border-slate-200/70">
                    ${items.map(s => `<span class="px-2.5 py-1 rounded-lg bg-white border border-slate-200 text-slate-700 font-bold text-[9px] uppercase tracking-tighter"># ${s}</span>`).join('')}
                </div>
            `;
        }

        function selectModule(idx) {
            currentModule = idx;
            const dominio = indexData.dominios[idx];
            const disciplinas = dominio.disciplinas.map(id => disciplinasCache[id]);
            const moduleItemCount = disciplinas.reduce((total, t) => total + countTopicItems(t), 0);

            document.querySelectorAll('.sidebar-item').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });

            document.getElementById('moduleHeader').innerHTML = `
                <div class="flex flex-wrap items-center gap-2 mb-3">
                    <span class="bg-amber-500 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Domínio ${dominio.id}</span>
                    <span class="bg-white border border-slate-200 text-slate-500 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${disciplinas.length} disciplinas</span>
                    <span class="bg-white border border-slate-200 text-slate-500 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${moduleItemCount} itens</span>
                </div>
                <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">${dominio.titulo}</h2>
                <p class="text-slate-500 mt-3 text-sm leading-relaxed max-w-2xl">${dominio.descricao}</p>
            `;

            document.getElementById('moduleStats').innerText = dominio.insight;

            const grid = document.getElementById('topicsGrid');
            grid.innerHTML = disciplinas.map((t, i) => `
                <div class="topic-card bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm transition-all hover:border-amber-300">
                    <button onclick="toggleTopic(this)" class="w-full p-5 flex items-start justify-between gap-4 text-left focus:outline-none bg-white hover:bg-slate-50/50 transition-colors">
                        <div class="flex items-start gap-4 min-w-0">
                            <span class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center text-[10px] text-white font-black shrink-0">${i+1}</span>
                            <div class="min-w-0">
                                <span class="block font-extrabold text-slate-800 text-sm uppercase tracking-tight leading-snug break-words">${t.nome}</span>
                                <div class="flex flex-wrap gap-1.5 mt-2">
                                    <span class="bg-slate-900 text-white px-2 py-0.5 rounded text-[9px] font-black uppercase mono">${t.id}</span>
                                    <span class="bg-amber-50 text-amber-700 border border-amber-100 px-2 py-0.5 rounded text-[9px] font-black uppercase">${t.nivel}</span>
                                    <span class="bg-slate-50 text-slate-500 border border-slate-100 px-2 py-0.5 rounded text-[9px] font-black uppercase">${t.carga_horaria}</span>
                                    <span class="bg-slate-50 text-slate-500 border border-slate-100 px-2 py-0.5 rounded text-[9px] font-black uppercase">${countTopicItems(t)} itens</span>
                                </div>
                            </div>
                        </div>
                        <span class="chevron transition-transform duration-500 text-slate-300 text-xs shrink-0 mt-2">▼</span>
                    </button>
                    <div class="topic-expansion">
                        <div class="px-6 pb-6 pt-5 border-t border-slate-100 bg-slate-50/70">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                ${renderList("Pré-requisitos", t.prerequisitos, "bg-blue-400")}
                                ${renderList("Objetivos", t.objetivos, "bg-amber-500")}
                                ${renderList("Prática esperada", t.pratica_esperada, "bg-emerald-500")}
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                ${renderList("Teoria", resolveConceitos(t.teoria), "bg-slate-400")}
                                ${renderList("Algoritmos e técnicas", resolveConceitos(t.algoritmos_tecnicas), "bg-indigo-400")}
                                ${renderList("Arquiteturas", resolveConceitos(t.arquiteturas), "bg-purple-400")}
                                ${renderList("Estruturas de dados", resolveConceitos(t.estruturas_dados), "bg-pink-400")}
                                ${renderList("Modelos matemáticos", resolveConceitos(t.modelos_matematicos), "bg-teal-500")}
                                ${renderList("Protocolos", resolveConceitos(t.protocolos), "bg-lime-500")}
                                ${renderList("Livros", t.livros, "bg-amber-500")}
                                ${renderList("Papers e referências", t.papers_fundamentais, "bg-rose-400")}
                                ${renderList("Ferramentas", t.ferramentas, "bg-cyan-500")}
                                ${renderList("Entrevista Staff", t.perguntas_entrevista_staff, "bg-violet-500")}
                                ${renderList("Projetos", t.projetos_reais, "bg-emerald-500")}
                                ${renderList("Exercícios", t.exercicios, "bg-slate-500")}
                                ${renderList("Estado da arte e debates", t.debates_estado_arte, "bg-orange-500")}
                            </div>

                            <div class="mt-6">
                                ${renderTags(t.tags)}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            updateRadar(dominio.radar);
        }

        function toggleTopic(btn) {
            const card = btn.closest('.topic-card');
            const isOpen = card.classList.contains('open');

            // Opcional: Fecha outros para foco (comentar se quiser multi-aberto)
            document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('open'));

            if (!isOpen) {
                card.classList.add('open');
            }
        }

        function updateRadar(data) {
            if (typeof Chart === "undefined") {
                return;
            }

            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChart) radarChart.destroy();

            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Teoria', 'Sistemas', 'Software', 'Dados', 'Distrib.', 'Liderança'],
                    datasets: [{
                        data: data,
                        backgroundColor: 'rgba(245, 158, 11, 0.15)',
                        borderColor: '#f59e0b',
                        borderWidth: 3,
                        pointBackgroundColor: '#f59e0b',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: { display: false },
                            grid: { color: '#f1f5f9' },
                            angleLines: { color: '#f1f5f9' },
                            pointLabels: {
                                font: { size: 9, weight: '800', family: 'Inter' },
                                color: '#94a3b8'
                            }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Busca Global
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (term.length < 2) {
                document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('ring-2', 'ring-amber-400'));
                return;
            }

            indexData.dominios.forEach((dominio, idx) => {
                const disciplinas = dominio.disciplinas.map(id => disciplinasCache[id]);
                const found = dominio.titulo.toLowerCase().includes(term) ||
                              disciplinas.some(t => t.__searchText.includes(term));

                const btn = document.querySelectorAll('.sidebar-item')[idx];
                if (found) {
                    btn.classList.add('ring-2', 'ring-amber-400');
                } else {
                    btn.classList.remove('ring-2', 'ring-amber-400');
                }
            });
        });

        window.onload = async () => {
            await loadAll();
            initSidebar();
            selectModule(0);
        };
    </script>
</body>
</html>
