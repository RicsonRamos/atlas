        :root {
            --primary: #f59e0b;
            --bg: #fcfcf9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .sidebar-item.active {
            background-color: #fff;
            border-left: 4px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            font-weight: 700;
            color: #000;
        }

            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }

        .topic-card.open .topic-expansion {
            max-height: 12000px;
            opacity: 1;
            padding-bottom: 1.5rem;
        }

        .topic-card.open .chevron {
            transform: rotate(180deg);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>

        function countTopicItems(topic) {
            return ["objectives", "theory", "practical", "algorithms", "papers", "books", "tools", "interview", "projects", "exercises", "skills"]
                .reduce((total, key) => total + (topic[key]?.length || 0), 0);
        }

        function renderList(title, items, marker = "bg-slate-300") {
            if (!items?.length) return "";

            return `
                <section>
                    <h6 class="text-[10px] font-black uppercase text-slate-400 mb-2 tracking-[0.18em]">${title}</h6>
                    <ul class="space-y-1.5">
                        ${items.map(item => `
                            <li class="flex gap-2 text-[11px] leading-relaxed text-slate-600">
                                <span class="w-1.5 h-1.5 rounded-full ${marker} mt-1.5 shrink-0"></span>
                                <span>${item}</span>
                            </li>
                        `).join('')}
                    </ul>
                </section>
            `;
        }

        function renderTags(items) {
            if (!items?.length) return "";

            return `
                <div class="flex flex-wrap gap-2 pt-4 border-t border-slate-200/70">
                    ${items.map(s => `<span class="px-2.5 py-1 rounded-lg bg-white border border-slate-200 text-slate-700 font-bold text-[9px] uppercase tracking-tighter"># ${s}</span>`).join('')}
                </div>
            `;
        }

        function flattenForSearch(value) {
            if (Array.isArray(value)) return value.map(flattenForSearch).join(" ");
            if (value && typeof value === "object") return Object.values(value).map(flattenForSearch).join(" ");
            return String(value || "");
        }

        function toggleTopic(btn) {
            const card = btn.closest('.topic-card');
            const isOpen = card.classList.contains('open');
            
            // Opcional: Fecha outros para foco (comentar se quiser multi-aberto)
            document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('open'));
            
            if (!isOpen) {
                card.classList.add('open');
            }
        }

        function updateRadar(data) {
            if (typeof Chart === "undefined") {
                return;
            }

            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChart) radarChart.destroy();

            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Teoria', 'Sistemas', 'Software', 'Dados', 'Distrib.', 'Liderança'],
                    datasets: [{
                        data: data,
                        backgroundColor: 'rgba(245, 158, 11, 0.15)',
                        borderColor: '#f59e0b',
                        borderWidth: 3,
                        pointBackgroundColor: '#f59e0b',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: { display: false },
                            grid: { color: '#f1f5f9' },
                            angleLines: { color: '#f1f5f9' },
                            pointLabels: { 
                                font: { size: 9, weight: '800', family: 'Inter' },
                                color: '#94a3b8'
                            }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Busca Global
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (term.length < 2) {
                document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('ring-2', 'ring-amber-400'));
                return;
            }

            roadmapData.forEach((mod, idx) => {
                const found = mod.title.toLowerCase().includes(term) || 
                              mod.topics.some(t => flattenForSearch(t).toLowerCase().includes(term));
                
                const btn = document.querySelectorAll('.sidebar-item')[idx];
                if (found) {
                    btn.classList.add('ring-2', 'ring-amber-400');
                } else {
                    btn.classList.remove('ring-2', 'ring-amber-400');
                }
            });
        });

        window.onload = () => {
            initSidebar();
            selectModule(0);
        };
    </script>
</body>
</html>
