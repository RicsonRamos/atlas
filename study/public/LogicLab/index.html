<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LogicLab — Laboratório interativo para ensino e experimentação de Lógica Proposicional, Predicados, Fuzzy e Quântica.">
    <title>LogicLab — Laboratório Interativo de Lógica</title>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            startup: { typeset: true }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- Three.js (Bloch sphere) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Chart.js (Fuzzy charts) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">
</head>
<body>

    <!-- ═══════════════════════════════════════════ -->
    <!-- Estrutura Principal da Aplicação            -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="app-container" id="app-container">

        <!-- ─── Sidebar ─── -->
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu principal">
            <!-- Conteúdo gerado por app.js -->
        </aside>

        <!-- ─── Área Principal ─── -->
        <div class="main-area">

            <!-- ─── Header ─── -->
            <header class="app-header" id="app-header" role="banner">
                <!-- Conteúdo gerado por app.js -->
            </header>

            <!-- ─── Conteúdo ─── -->
            <main class="main-content" id="main-content" role="main">
                <!-- Seções geradas por app.js -->
            </main>

        </div>

    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- Toast Container                            -->
    <!-- ═══════════════════════════════════════════ -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- Scripts do LogicLab                        -->
    <!-- ═══════════════════════════════════════════ -->
    <!-- Utilidades (carregar primeiro) -->
    <script src="js/utils.js"></script>

    <!-- Parser de expressões -->
    <script src="js/parser.js"></script>

    <!-- Módulos de lógica -->
    <script src="js/propositional.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/predicate.js"></script>
    <script src="js/fuzzy.js"></script>
    <script src="js/bloch.js"></script>
    <script src="js/quantum.js"></script>

    <!-- Aplicação principal (carregar por último) -->
    <script src="js/app.js"></script>

</body>
</html>
